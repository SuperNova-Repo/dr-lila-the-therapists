name: Bi-Directional Sync

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}
      
      - name: Configure Git
        run: |
          git config user.name "🤖 Auto-Sync"
          git config user.email "sync@actions.github.com"
      
      - name: Setup HF Remote
        run: |
          git remote add hf https://USER:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/Kostya-Lolinger/dr-lila-therapist 2>/dev/null || true
          git remote -v
      
      - name: Bi-Directional Sync
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔄 Starting Bi-Directional Sync"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Fetch from HF
          echo "📥 Fetching from HuggingFace..."
          git fetch hf main 2>/dev/null || echo "⚠️  Fetch warning (might be first run)"
          
          # Check for HF updates
          if git rev-parse hf/main >/dev/null 2>&1; then
            if ! git diff --quiet HEAD hf/main; then
              echo "📥 HF has updates! Merging..."
              git merge hf/main --no-edit --allow-unrelated-histories -m "Sync from HF [$(date '+%Y-%m-%d %H:%M')]"
              git push origin main
              echo "✅ HF → GitHub: Synced"
            else
              echo "ℹ️  HF → GitHub: No changes"
            fi
          fi
          
          # Push to HF
          echo "📤 Pushing to HuggingFace..."
          if git push hf main 2>&1; then
            echo "✅ GitHub → HF: Synced"
          else
            echo "⚠️  GitHub → HF: Push failed (might be already up-to-date)"
          fi
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Sync Complete!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
