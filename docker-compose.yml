version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile  # Erstelle einen, falls nicht vorhanden (siehe unten)
    ports:
      - "8000:7860"         # Oder dein interner Port
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - HF_TOKEN=${HF_TOKEN}          # Falls gated Model (Qwen2.5-3B ist open)
      - DATABASE_URL=sqlite:///./data/db/app.db
      # Deine anderen Env-Vars (JWT_SECRET usw.)
    restart: unless-stopped

  # Optional: frontend (vite/react)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend
